<!DOCTYPE html>
<html lang="id" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Inventory Lab Komp{% endblock %}</title>

    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">

    <!-- Tailwind CSS (dihasilkan oleh Tailwind CLI) -->
    <link href="{{ url_for('static', filename='/output.css') }}" rel="stylesheet">

    <!-- Font dari Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        .progress-bar {
            height: 6px;
            border-radius: 3px;
        }

        .nav-link {
            position: relative;
        }

        .nav-link::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: -4px;
            left: 0;
            background-color: #4f46e5;
            transition: width 0.3s ease;
        }

        .nav-link:hover::after {
            width: 100%;
        }

        .section-fade {
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.6s ease, transform 0.6s ease;
        }

        .section-fade.visible {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
    {% block head %}{% endblock %}
    <meta name="csrf-token" content="{{ csrf_token() }}">
</head>

<body class="bg-gradient-to-br from-slate-50 to-blue-50 min-h-screen flex flex-col">
    <nav class="bg-white/70 backdrop-blur-lg border-b border-gray-200/50 sticky top-0 z-50">
        <div class="max-w-5xl mx-auto px-6 py-4 flex items-center justify-between">
            <a href="/" class="flex items-center gap-2 group">
                <div
                    class="w-10 h-10 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-xl flex items-center justify-center transform group-hover:scale-110 transition">
                    <span class="text-white text-xl">💻</span>
                </div>
                <span class="font-bold text-gray-800">Inventaris Lab</span>
            </a>
            <a href="{{ base_url }}" target="_blank" rel="noopener noreferrer"
                class="flex items-center gap-2 px-4 py-2 bg-blue-50 text-sm font-bold text-blue-600 rounded-full hover:bg-blue-600 hover:text-white transition-all duration-300 border border-blue-100">
                <span>manulab</span>
            </a>
        </div>
    </nav>

    <main>
        <!-- Container: center and responsive -->
        <div class="min-h-screen flex items-center justify-center px-8 md:px-4">
            <div class="w-full max-w-md">

                {% with messages = get_flashed_messages() %}
                {% if messages %}
                <div class="p-3 mb-6 text-sm text-yellow-800 rounded-lg bg-yellow-50" role="alert">
                    {% for msg in messages %}
                    <span>{{ msg }}</span>
                    {% endfor %}
                </div>
                {% endif %}
                {% endwith %}

                <!-- Info Teks -->
                <h2 class="text-lg font-semibold text-left text-gray-700 mb-8">
                    Login to access the system
                </h2>

                <!-- Form -->
                <form method="post" action="{{ url_for('login') }}" class="space-y-6">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                    <!-- Username -->
                    <div class="relative z-0 w-full group">
                        <input type="text" name="username" id="floating_username"
                            class="block py-2.5 px-2.5 w-full text-sm text-gray-900 bg-transparent border-0 border-b-2 border-gray-300 appearance-none focus:outline-none focus:ring-0 focus:border-blue-600 peer"
                            placeholder=" " required />
                        <label for="floating_username"
                            class="peer-focus:font-medium absolute text-sm text-gray-500 duration-300 transform -translate-y-6 scale-75 top-2 -z-10 origin-[0] peer-placeholder-shown:translate-y-0 peer-placeholder-shown:scale-100 peer-focus:scale-75 peer-focus:-translate-y-6">
                            Username
                        </label>
                    </div>

                    <!-- Password -->
                    <div class="relative z-0 w-full group">
                        <input type="password" name="password" id="floating_password"
                            class="block py-2.5 px-2.5 w-full text-sm text-gray-900 bg-transparent border-0 border-b-2 border-gray-300 appearance-none focus:outline-none focus:ring-0 focus:border-blue-600 peer"
                            placeholder=" " required />
                        <label for="floating_password"
                            class="peer-focus:font-medium absolute text-sm text-gray-500 duration-300 transform -translate-y-6 scale-75 top-2 -z-10 origin-[0] peer-placeholder-shown:translate-y-0 peer-placeholder-shown:scale-100 peer-focus:scale-75 peer-focus:-translate-y-6">
                            Password
                        </label>
                    </div>

                    <!-- Submit Button -->
                    <div class="flex flex-row items-center gap-4">
                        <button id="loginBtn" type="submit"
                            class="flex-1 flex items-center justify-center gap-2 text-white bg-blue-600 hover:bg-blue-700 focus:ring-4 focus:outline-none focus:ring-blue-300 font-medium rounded-lg text-sm px-5 py-2.5 transition-all duration-200 cursor-pointer">
                            <span id="btnText" class="flex items-center">
                                <i class="fa-solid fa-right-to-bracket mr-2"></i> Login
                            </span>
                            <svg id="spinner" class="hidden w-4 h-4 animate-spin text-white" fill="none"
                                viewBox="0 0 24 24">
                                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor"
                                    stroke-width="4"></circle>
                                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v4a4 4 0 00-4 4H4z">
                                </path>
                            </svg>
                        </button>

                        <a href="{{ url_for('landing') }}"
                            class="flex-1 flex items-center justify-center gap-2 text-gray-800 bg-white border border-gray-200 hover:bg-gray-50 hover:text-blue-600 focus:ring-4 focus:outline-none focus:ring-blue-300 font-medium rounded-lg text-sm px-5 py-2.5 transition-all duration-200 no-underline border-solid">
                            <span>Landing Page</span>
                        </a>
                    </div>
                </form>

            </div>
        </div>
    </main>

    <footer class="bg-gradient-to-r from-gray-900 to-slate-800 text-white py-6 mt-auto">
        <div class="max-w-5xl mx-auto px-6 text-center space-y-2">
            <div class="flex items-center justify-center gap-3 text-xs font-medium tracking-wide">
                <span class="opacity-90">Inventory Lab Komp</span>
                <span class="text-gray-600">•</span>
                <a href="https://github.com/hanifamar17/peminjaman-barang" target="_blank"
                    class="flex items-center gap-1.5 hover:text-blue-400 transition-colors">
                    <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24">
                        <path
                            d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.041-1.416-4.041-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z" />
                    </svg>
                    GitHub
                </a>
            </div>

            <p class="text-[10px] text-gray-500 tracking-widest">&copy; <span id="current-year"></span> —
                Dibuat dengan 🫰</p>
        </div>
    </footer>

    <script>
        document.getElementById("current-year").textContent = new Date().getFullYear();
    </script>
</body>

</html>
