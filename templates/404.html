{% extends 'base.html' %}
{% block title %}404 - Halaman Tidak Ditemukan{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-gray-50 px-6 py-12">
    <div class="w-full max-w-lg text-center">
        
        <div class="relative mb-8">
            <h1 class="text-7xl md:text-9xl font-black text-gray-200 tracking-tighter select-none">
                404
            </h1>
            <p class="absolute inset-0 flex items-center justify-center text-2xl md:text-3xl font-bold text-blue-600 mt-4">
                Oops!
            </p>
        </div>

        <div class="space-y-3">
            <h2 class="text-2xl md:text-3xl font-bold text-gray-800 tracking-tight">
                Alamat tidak ditemukan.
            </h2>
            <p class="text-sm md:text-base text-gray-600 max-w-sm mx-auto leading-relaxed">
                Mungkin tautan sudah kedaluwarsa atau terjadi kesalahan pengetikan. Mari kembali ke jalur yang benar.
            </p>
        </div>

        <div class="mt-10 flex flex-col sm:flex-row items-center justify-center gap-3">
            <a href="/" 
               class="w-full sm:w-auto order-2 sm:order-1 px-8 py-3.5 bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-xl shadow-lg shadow-blue-200 transition-all active:scale-95">
                Beranda
            </a>
            
            <button onclick="history.back()" 
                    class="w-full sm:w-auto order-1 sm:order-2 px-8 py-3.5 bg-white border border-gray-200 text-gray-600 font-medium rounded-xl hover:bg-gray-50 transition-all active:scale-95 cursor-pointer">
                ← Kembali
            </button>
        </div>
        
    </div>
</div>
{% endblock %}
