<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Inventory Lab Komp{% endblock %}</title>

    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">

    <!-- Tailwind CSS (dihasilkan oleh Tailwind CLI) -->
    <link href="{{ url_for('static', filename='/output.css') }}" rel="stylesheet">

    <!-- Font dari Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
   
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .progress-bar {
            height: 6px;
            border-radius: 3px;
        }
        .nav-link {
            position: relative;
        }
        .nav-link::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: -4px;
            left: 0;
            background-color: #4f46e5;
            transition: width 0.3s ease;
        }
        .nav-link:hover::after {
            width: 100%;
        }
        .section-fade {
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.6s ease, transform 0.6s ease;
        }
        .section-fade.visible {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
    {% block head %}{% endblock %}
</head>
<body class="bg-gradient-to-br from-slate-50 to-blue-50">
    <nav class="bg-white/70 backdrop-blur-lg border-b border-gray-200/50 sticky top-0 z-50">
        <div class="max-w-5xl mx-auto px-6 py-4 flex items-center justify-between">
            <a href="/" class="flex items-center gap-2 group">
                <div class="w-10 h-10 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-xl flex items-center justify-center transform group-hover:scale-110 transition">
                    <span class="text-white text-xl">💻</span>
                </div>
                <span class="font-bold text-gray-800 hidden sm:block">Inventaris Lab</span>
            </a>
            <a href="/" class="text-sm font-medium text-blue-600 hover:text-blue-700 transition">Beranda</a>
        </div>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer class="bg-gradient-to-r from-gray-900 to-slate-800 text-white py-8 mt-auto">
        <div class="max-w-5xl mx-auto px-6 text-center">
            <div class="inline-block px-4 py-2 bg-white/10 rounded-full backdrop-blur-sm mb-3">
                <span class="font-semibold">DevFolio</span>
            </div>
            <p class="text-gray-400 text-sm">© 2025 · Dibuat dengan ❤️</p>
        </div>
    </footer>
</body>
</html>
