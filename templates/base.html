<!DOCTYPE html>
<html lang="id" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Inventory Lab Komp{% endblock %}</title>

    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">

    <!-- Tailwind CSS (dihasilkan oleh Tailwind CLI) -->
    <link href="{{ url_for('static', filename='/output.css') }}" rel="stylesheet">

    <!-- Font dari Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- SweetAlert2 untuk notifikasi -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <!-- Font Awesome untuk ikon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        .progress-bar {
            height: 6px;
            border-radius: 3px;
        }

        .nav-link {
            position: relative;
        }

        .nav-link::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: -4px;
            left: 0;
            background-color: #4f46e5;
            transition: width 0.3s ease;
        }

        .nav-link:hover::after {
            width: 100%;
        }

        .section-fade {
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.6s ease, transform 0.6s ease;
        }

        .section-fade.visible {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
    {% block head %}{% endblock %}
</head>

<body class="bg-gradient-to-br from-slate-50 to-blue-50 min-h-screen flex flex-col">
    <nav class="bg-white/70 backdrop-blur-lg border-b border-gray-200/50 sticky top-0 z-50">
        <div class="max-w-5xl mx-auto px-6 py-4 flex items-center justify-between">
            <a href="/" class="flex items-center gap-2 group">
                <div
                    class="w-10 h-10 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-xl flex items-center justify-center transform group-hover:scale-110 transition">
                    <span class="text-white text-xl">💻</span>
                </div>
                <span class="font-bold text-gray-800">Inventaris Lab</span>
            </a>
            {% if session.get('user') %}
            <div class="relative inline-block text-left" id="userDropdownContainer">
                <button id="dropdownBtn" type="button"
                    class="flex items-center gap-2 p-1 md:p-1.5 pr-2 md:pr-3 text-xs md:text-sm font-medium text-gray-700 hover:bg-gray-100 rounded-full border border-gray-300 transition-all focus:outline-none cursor-pointer">
                    <div id="avatarIcon"
                        class="w-6 h-6 md:w-7 md:h-7 bg-gray-100 text-gray-500 rounded-full flex items-center justify-center shrink-0 transition-colors">
                        <i class="fa-solid fa-user-gear text-[10px] md:text-xs"></i>
                    </div>

                    <span class="max-w-[70px] md:max-w-[100px] truncate select-none">
                        {{ session.get('user') }}
                    </span>

                    <i id="chevronIcon"
                        class="fa-solid fa-chevron-down text-[8px] md:text-[10px] text-gray-400 transition-transform duration-200"></i>
                </button>

                <div id="dropdownMenu"
                    class="hidden absolute right-0 mt-2 w-48 md:w-52 bg-white border border-gray-100 rounded-2xl shadow-xl z-[100] overflow-hidden transform origin-top-right">

                    <div class="px-4 py-3 bg-gray-50/50 border-b border-gray-100">
                        <p class="text-[10px] text-gray-400 uppercase font-bold tracking-wider">Akun Terhubung</p>
                        <p class="text-sm font-semibold text-gray-800 truncate">{{ session.get('user') }}</p>
                    </div>

                    <div class="py-1">
                        <a href="{{ base_url }}" target="_blank" rel="noopener noreferrer"
                            class="flex items-center gap-3 px-4 py-3 md:py-2.5 text-sm text-gray-700 hover:bg-blue-50 hover:text-blue-600 transition">
                            <i class="fa-solid fa-cubes w-4 text-center"></i>
                            <span>labmanu-hub</span>
                        </a>

                        <div class="px-2 my-1">
                            <hr class="border-gray-100">
                        </div>

                        <a href="{{ url_for('logout') }}"
                            class="flex items-center gap-3 px-4 py-3 md:py-2.5 text-sm text-red-600 hover:bg-red-50 transition">
                            <i class="fa-solid fa-right-from-bracket w-4 text-center"></i>
                            <span>Keluar</span>
                        </a>
                    </div>
                </div>
            </div>
            {% endif %}
        </div>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer class="bg-gradient-to-r from-gray-900 to-slate-800 text-white py-6 mt-auto">
        <div class="max-w-5xl mx-auto px-6 text-center space-y-2">
            <div class="flex items-center justify-center gap-3 text-xs font-medium tracking-wide">
                <span class="opacity-90">Inventory Lab Komp</span>
                <span class="text-gray-600">•</span>
                <a href="https://github.com/hanifamar17/peminjaman-barang" target="_blank"
                    class="flex items-center gap-1.5 hover:text-blue-400 transition-colors">
                    <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24">
                        <path
                            d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.041-1.416-4.041-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z" />
                    </svg>
                    GitHub
                </a>
            </div>

            <p class="text-[10px] text-gray-500 tracking-widest">&copy; <span id="current-year"></span> —
                Dibuat dengan 🫰</p>
        </div>
    </footer>

    <script>
        document.getElementById("current-year").textContent = new Date().getFullYear();

        document.addEventListener('DOMContentLoaded', () => {
            const btn = document.getElementById('dropdownBtn');
            const menu = document.getElementById('dropdownMenu');
            const container = document.getElementById('userDropdownContainer');
            const chevron = document.getElementById('chevronIcon');
            const avatar = document.getElementById('avatarIcon');

            if (!btn || !menu) return;

            // Fungsi Toggle
            const toggleMenu = () => {
                const isHidden = menu.classList.contains('hidden');
                if (isHidden) {
                    // Munculkan menu
                    menu.classList.remove('hidden');
                    chevron.classList.add('rotate-180');
                    avatar.classList.add('bg-blue-600', 'text-white');
                } else {
                    // Sembunyikan menu
                    menu.classList.add('hidden');
                    chevron.classList.remove('rotate-180');
                    avatar.classList.remove('bg-blue-600', 'text-white');
                }
            };

            // Event Klik pada Button
            btn.addEventListener('click', (e) => {
                e.stopPropagation(); // Mencegah event "bubble" ke document
                toggleMenu();
            });

            // Klik di luar untuk menutup menu
            document.addEventListener('click', (e) => {
                // Jika menu sedang terbuka dan yang diklik bukan bagian dari dropdown
                if (!menu.classList.contains('hidden') && !container.contains(e.target)) {
                    menu.classList.add('hidden');
                    chevron.classList.remove('rotate-180');
                    avatar.classList.remove('bg-blue-600', 'text-white');
                }
            });

            // Mencegah menu tertutup saat mengklik area di dalam menu itu sendiri
            menu.addEventListener('click', (e) => {
                e.stopPropagation();
            });
        });
    </script>
</body>

</html>
