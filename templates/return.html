{% extends "base.html" %}
{% block content %}
<div class="max-w-xl mx-auto p-4">
    <h1 class="text-xl font-semibold mb-4">Pengembalian Barang</h1>

    <!-- FORM INPUT KODE -->
    <div class="bg-white rounded-lg shadow p-4 space-y-3">
        <label class="block text-sm font-medium">Kode Peminjaman</label>
        <input id="loanCode" type="text" placeholder="Contoh: LOAN-AB12"
            class="w-full border rounded px-3 py-2 focus:outline-none focus:ring" />
    </div>

    <!-- RINGKASAN -->
    <div id="loanSummary" class="hidden mt-4 bg-gray-50 border rounded-lg p-4">
        <h2 class="font-semibold mb-2">Ringkasan Peminjaman</h2>
        <ul class="text-sm space-y-1">
            <li><b>Nama:</b> <span id="sBorrower"></span></li>

            <li>
                <b>Barang:</b>
                <ul id="sItems" class="list-disc ml-5"></ul>
            </li>

            <li><b>Tgl Pinjam:</b> <span id="sLoanDate"></span></li>
            <li><b>Tgl Kembali:</b> <span id="sReturnDate"></span></li>
            <li><b>Status:</b> <span id="sStatus" class="font-semibold"></span></li>
        </ul>

        <!-- UPLOAD FOTO -->
        <div class="mt-3">
            <label class="block text-sm font-medium">Foto Bukti Pengembalian</label>
            <input type="file" id="proof" accept="image/*" class="mt-1 block w-full text-sm" />
        </div>

        <button id="btnReturn" class="mt-4 w-full bg-green-600 text-white py-2 rounded hover:bg-green-700">
            Dikembalikan
        </button>
    </div>
</div>

<!-- SweetAlert -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        const loanCodeInput = document.getElementById("loanCode");
        const summaryBox = document.getElementById("loanSummary");
        const btnReturn = document.getElementById("btnReturn");
        const proofInput = document.getElementById("proof");

        let currentLoan = null;
        let debounceTimer = null;

        /* =========================
           DEBOUNCE INPUT KODE
        ========================== */
        loanCodeInput.addEventListener("input", () => {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(fetchLoan, 700);
        });

        /* =========================
           FETCH DATA PEMINJAMAN
        ========================== */
        function fetchLoan() {
            const code = loanCodeInput.value.trim();
            if (!code) return;

            fetch(`/api/loan/${code}`)
                .then(res => res.json())
                .then(res => {
                    if (!res.ok) {
                        summaryBox.classList.add("hidden");
                        return;
                    }

                    const loan = res.loan;
                    currentLoan = loan;

                    document.getElementById("sBorrower").innerText = loan.borrower_name;
                    document.getElementById("sLoanDate").innerText = loan.loan_date;
                    document.getElementById("sReturnDate").innerText = loan.return_date;
                    document.getElementById("sStatus").innerText = loan.status;

                    // ===== BARANG (MULTI) =====
                    const itemsBox = document.getElementById("sItems");
                    itemsBox.innerHTML = "";

                    loan.items.forEach(item => {
                        const li = document.createElement("li");
                        li.textContent = `${item.item_name} × ${item.qty}`;
                        itemsBox.appendChild(li);
                    });

                    btnReturn.disabled = loan.status === "dikembalikan";
                    btnReturn.classList.toggle("opacity-50", loan.status === "dikembalikan");

                    summaryBox.classList.remove("hidden");
                });
        }
        /* =========================
           SUBMIT PENGEMBALIAN
        ========================== */
        btnReturn.addEventListener("click", () => {
            if (!currentLoan) return;

            Swal.fire({
                title: "Konfirmasi",
                text: "Yakin semua barang sudah dikembalikan?",
                icon: "question",
                showCancelButton: true,
                confirmButtonText: "Ya, dikembalikan",
                cancelButtonText: "Batal"
            }).then(result => {
                if (!result.isConfirmed) return;

                const formData = new FormData();
                formData.append("code", currentLoan.code);

                // foto bukti (opsional)
                if (proofInput && proofInput.files.length > 0) {
                    formData.append("proof", proofInput.files[0]);
                }

                fetch("/return/submit", {
                    method: "POST",
                    body: formData
                })
                    .then(res => res.json())
                    .then(res => {
                        if (res.ok) {
                            Swal.fire({
                                icon: "success",
                                title: "Berhasil",
                                text: "Barang berhasil dikembalikan"
                            }).then(() => location.reload());
                        } else {
                            Swal.fire("Gagal", res.error || "Terjadi kesalahan", "error");
                        }
                    })
                    .catch(() => {
                        Swal.fire("Error", "Server tidak merespons", "error");
                    });
            });
        });
    });
</script>

{% endblock %}
